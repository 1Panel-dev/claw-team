name: build-and-push-base

run-name: 构建基础镜像 (${{ github.event.inputs.architecture }})

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture'
        required: true
        default: 'linux/amd64'
        type: choice
        options:
          - linux/amd64
          - linux/arm64
          - linux/amd64,linux/arm64

jobs:
  build-and-push-base-to-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Prepare
        id: prepare
        run: |
          DOCKER_IMAGE=ghcr.io/1panel-dev/claw-team-base
          DOCKER_PLATFORMS=${{ github.event.inputs.architecture }}
          TAG_NAME=python3.12-20260401
          DOCKER_IMAGE_TAGS="--tag ${DOCKER_IMAGE}:${TAG_NAME}"
          {
            echo "docker_image=${DOCKER_IMAGE}"
            echo "version=${TAG_NAME}"
            echo "buildx_args=--platform ${DOCKER_PLATFORMS} --no-cache \
              --build-arg VERSION=${TAG_NAME} \
              --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
              --build-arg VCS_REF=${GITHUB_SHA::8} \
              ${DOCKER_IMAGE_TAGS} ."
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Docker Buildx (build-and-push)
        run: |
          docker buildx build --output "type=image,push=true" \
            ${{ steps.prepare.outputs.buildx_args }} \
            -f Dockerfile.base
